<busconfig>
  <!-- vmc runs as chronos -->
  <policy user="chronos">
    <allow own="org.monyhar.ChromeFeaturesService"/>
  </policy>

  <!-- upstart and tast run as root -->
  <policy user="root">
    <allow send_destination="org.monyhar.ChromeFeaturesService"
           send_interface="org.monyhar.ChromeFeaturesServiceInterface"/>
  </policy>

  <!-- limit typecd daemon visibility to only IsPeripheralDataAccessEnabled -->
  <policy user="typecd">
    <allow send_destination="org.monyhar.ChromeFeaturesService"
           send_interface="org.monyhar.ChromeFeaturesServiceInterface"
           send_member="IsPeripheralDataAccessEnabled"/>
  </policy>

  <!-- limit dns-proxy daemon visibility to only IsDNSProxyEnabled -->
  <policy user="dns-proxy">
    <allow send_destination="org.monyhar.ChromeFeaturesService"
           send_interface="org.monyhar.ChromeFeaturesServiceInterface"
           send_member="IsDNSProxyEnabled"/>
  </policy>
</busconfig>
