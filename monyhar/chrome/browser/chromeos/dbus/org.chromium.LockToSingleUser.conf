<busconfig>
  <policy user="chronos">
    <allow own="org.monyhar.LockToSingleUser"/>
    <allow receive_sender="org.monyhar.LockToSingleUser"
           receive_interface="org.monyhar.LockToSingleUser"/>
  </policy>

  <!--
    vmc uses this service to ask Chrome to lock the device to a single user
    before starting a VM.
  -->
  <policy user="chronos">
    <allow send_destination="org.monyhar.LockToSingleUser"
           send_interface="org.monyhar.LockToSingleUser"/>
  </policy>

  <!-- testers run as root to execute vmc -->
  <policy user="root">
    <allow send_destination="org.monyhar.LockToSingleUser"
           send_interface="org.monyhar.LockToSingleUser"/>
  </policy>
</busconfig>
